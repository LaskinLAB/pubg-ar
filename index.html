<!DOCTYPE html>
<html lang="ru">
<head>
    <title>KALINKA PUBG - AR</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        body { 
            margin: 0; 
            background-color: #0f0f0f; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
        }
        
        .ar-ui-container {
            position: absolute;
            bottom: 120px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 100%;
            text-align: center;
            pointer-events: none; 
        }

        .ar-link-button {
            display: inline-block;
            padding: 16px 36px;
            border-radius: 50px; 
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5); 
            
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            
            pointer-events: auto; 
            transition: background 0.3s ease;
        }

        #ar-button {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 32px;
            border-radius: 16px; 
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .web-link {
            position: absolute;
            top: 80px; 
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .ar-link-button:active, #ar-button:active, .web-link:active {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(-50%) scale(0.97);
        }

        /* === ПРЕДУПРЕЖДЕНИЕ ДЛЯ TELEGRAM === */
        #webview-warning {
            display: none; /* Скрыто по умолчанию, пока скрипт не найдет Телегу */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 15, 15, 0.98);
            z-index: 9999;
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .warning-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
        }

        .warning-box h2 { margin-top: 0; color: #ff4500; }
        .warning-box p { font-size: 18px; line-height: 1.5; margin-bottom: 20px; }

        .arrow-up {
            font-size: 50px;
            animation: bounce 1s infinite;
            margin-bottom: 20px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div id="webview-warning">
        <div class="arrow-up">☝️</div>
        <div class="warning-box">
            <h2>AR заблокирован мессенджером</h2>
            <p>Telegram не дает доступ к камере.</p>
            <p><strong>Нажми на три точки (или иконку Safari) в правом верхнем углу и выбери<br>«Открыть в браузере»</strong></p>
        </div>
    </div>

    <model-viewer 
        src="model.glb" 
        ios-src="model.usdz"
        scale="0.05 0.05 0.05"
        camera-orbit="0deg 80deg auto"
        exposure="0.6" 
        tone-mapping="neutral"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        autoplay
        shadow-intensity="1.5"
    >
        <a class="web-link" href="https://www.youtube.com/@KALINKA_PUBG" target="_blank">
            ▶️ КАНАЛ KALINKA PUBG
        </a>
        <div slot="ar-ui" class="ar-ui-container">
            <a class="ar-link-button" href="https://www.youtube.com/@KALINKA_PUBG" target="_blank">
                🔴 ПЕРЕЙТИ НА КАНАЛ
            </a>
        </div>
        <button slot="ar-button" id="ar-button">
            ПОСТАВИТЬ НА СТОЛ
        </button>
    </model-viewer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            
            var isWebView = (ua.indexOf("Instagram") > -1) || 
                            (ua.indexOf("FBAN") > -1) || 
                            (ua.indexOf("FBAV") > -1) || 
                            (ua.indexOf("Telegram") > -1) || 
                            (ua.indexOf("VKWebView") > -1) ||
                            // Супер-хак для iOS: если это iPhone/iPad, но браузер не отдает подпись оригинального Safari
                            (/iPhone|iPod|iPad/.test(ua) && !/Safari/.test(ua) && !/CriOS/.test(ua) && !/FxiOS/.test(ua));

            if (isWebView) {
                document.getElementById('webview-warning').style.display = 'flex';
            }
        });
    </script>

</body>
</html>
