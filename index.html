<!DOCTYPE html>
<html lang="ru">
<head>
    <title>KALINKA PUBG - AR</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        body { 
            margin: 0; 
            background-color: #0f0f0f; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
        }
        
        /* === КОНТЕЙНЕР ДЛЯ AR === */
        .ar-ui-container {
            position: absolute;
            bottom: 120px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 100%;
            text-align: center;
            pointer-events: none; 
        }

        /* === СТЕКЛЯННАЯ КНОПКА (YouTube) В AR === */
        .ar-link-button {
            display: inline-block;
            padding: 16px 36px;
            border-radius: 50px; /* Круглая как капсула */
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5); /* Чтобы текст читался на светлом фоне */
            
            /* Эффект Apple Glass */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); /* Для сафари на айфонах */
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            
            pointer-events: auto; 
            transition: background 0.3s ease;
        }

        /* === СТЕКЛЯННАЯ КНОПКА "ПОСТАВИТЬ НА СТОЛ" === */
        #ar-button {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 32px;
            border-radius: 16px; /* Чуть более квадратная, в стиле виджетов iOS */
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            
            /* Эффект Apple Glass */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        /* === СТЕКЛЯННАЯ КНОПКА СВЕРХУ (До запуска AR) === */
        .web-link {
            position: absolute;
            top: 80px; 
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            
            /* Эффект Apple Glass */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        /* Легкая анимация при нажатии на стеклянные кнопки */
        .ar-link-button:active, #ar-button:active, .web-link:active {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(-50%) scale(0.97);
        }
    </style>
</head>
<body>

    <model-viewer 
        src="model.glb" 
        scale="0.05 0.05 0.05"
        camera-orbit="0deg 80deg auto"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        autoplay
        shadow-intensity="1.5"
    >
        
        <a class="web-link" href="https://www.youtube.com/@KALINKA_PUBG" target="_blank">
            ▶️ КАНАЛ KALINKA PUBG
        </a>

        <div slot="ar-ui" class="ar-ui-container">
            <a class="ar-link-button" href="https://www.youtube.com/@KALINKA_PUBG" target="_blank">
                🔴 ПЕРЕЙТИ НА КАНАЛ
            </a>
        </div>

        <button slot="ar-button" id="ar-button">
            ПОСТАВИТЬ НА СТОЛ
        </button>

    </model-viewer>

</body>
</html>
